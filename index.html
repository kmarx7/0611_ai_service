<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>바이브 코딩 AI 스택</title>
    <link rel="stylesheet" href="./styles.css?v=workflow-dashboard" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">AI</span>
          <div>
            <h1>바이브 코딩 AI 스택</h1>
            <p>아이디어부터 배포까지, 작업 단계별로 정리한 AI 서비스 링크 보드</p>
          </div>
        </div>
        <nav class="top-menu" aria-label="작업 단계">
          <button class="top-tab active" type="button" data-workflow="전체">전체</button>
          <button class="top-tab" type="button" data-workflow="아이디어/리서치">아이디어/리서치</button>
          <button class="top-tab" type="button" data-workflow="콘텐츠 생성">콘텐츠 생성</button>
          <button class="top-tab" type="button" data-workflow="코딩/빌드">코딩/빌드</button>
          <button class="top-tab" type="button" data-workflow="저장소/협업">저장소/협업</button>
          <button class="top-tab" type="button" data-workflow="배포/운영">배포/운영</button>
        </nav>
      </header>

      <main class="layout">
        <aside class="sidebar" aria-label="소 카테고리">
          <div class="sidebar-title">사용 분류</div>
          <button class="side-item active" type="button" data-subcategory="전체">전체 보기</button>
          <button class="side-item" type="button" data-subcategory="대화형 AI">대화형 AI</button>
          <button class="side-item" type="button" data-subcategory="검색/리서치">검색/리서치</button>
          <button class="side-item" type="button" data-subcategory="이미지 생성/편집">이미지 생성/편집</button>
          <button class="side-item" type="button" data-subcategory="영상 생성">영상 생성</button>
          <button class="side-item" type="button" data-subcategory="음악/음성">음악/음성</button>
          <button class="side-item" type="button" data-subcategory="앱/웹 빌더">앱/웹 빌더</button>
          <button class="side-item" type="button" data-subcategory="AI 코드 에디터">AI 코드 에디터</button>
          <button class="side-item" type="button" data-subcategory="코드/저장소">코드/저장소</button>
          <button class="side-item" type="button" data-subcategory="배포/호스팅">배포/호스팅</button>
          <button class="side-item" type="button" data-subcategory="DB/백엔드">DB/백엔드</button>
          <button class="side-item" type="button" data-subcategory="API/테스트">API/테스트</button>
          <button class="side-item" type="button" data-subcategory="모델 허브">모델 허브</button>
          <button class="side-item" type="button" data-subcategory="업무 생산성">업무 생산성</button>
        </aside>

        <section class="content" aria-live="polite">
          <div class="workflow-strip" aria-label="바이브 코딩 워크플로우">
            <div class="workflow-step">
              <span>01</span>
              <strong>리서치</strong>
              <p>대화형 AI와 검색으로 요구사항 정리</p>
            </div>
            <div class="workflow-step">
              <span>02</span>
              <strong>생성</strong>
              <p>이미지, 영상, 음악 소재 제작</p>
            </div>
            <div class="workflow-step">
              <span>03</span>
              <strong>빌드</strong>
              <p>AI 에디터와 앱 빌더로 구현</p>
            </div>
            <div class="workflow-step">
              <span>04</span>
              <strong>배포</strong>
              <p>Git 저장소, DB, 호스팅 연결</p>
            </div>
          </div>
          <div class="content-head">
            <div>
              <p class="eyebrow">Workflow Directory</p>
              <h2 id="view-title">전체 워크플로우</h2>
            </div>
            <div class="count-pill"><span id="service-count">0</span>개 서비스</div>
          </div>
          <div class="card-grid" id="service-grid"></div>
          <p class="empty-state" id="empty-state" hidden>선택한 조건에 맞는 서비스가 없습니다.</p>
        </section>
      </main>
    </div>

    <script src="./app.js?v=workflow-dashboard"></script>
  </body>
</html>
